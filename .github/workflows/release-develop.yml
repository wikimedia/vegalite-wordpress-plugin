name: Develop Release

on:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    name: "Update release-develop branch"
    uses: humanmade/hm-github-actions/.github/workflows/build-and-release-node.yml@1926fac5ec904aef6167fa3ba54477b0d9324462 # v0.4.0
    with:
      node_version: 24
      source_branch: develop
      release_branch: release-develop
      built_asset_paths: build
      build_script: |
        npm ci
        npm run build
